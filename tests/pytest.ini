[tool:pytest]
# Pytest configuration for AI-Server testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test execution
addopts = 
    --strict-markers
    --strict-config
    --verbosity=1
    --tb=short
    --showlocals
    --durations=10

# Markers
markers =
    unit: Unit tests - test individual components in isolation
    integration: Integration tests - test component interactions
    functional: Functional tests - test end-to-end workflows
    slow: Slow running tests (> 5 seconds)
    network: Tests that require network access
    models: Tests that require model files
    startup: Tests for startup functionality
    memory_server: Tests for Memory-Server components
    llm_server: Tests for LLM-Server components
    model_watcher: Tests for Model Watcher service

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(filename)s:%(lineno)d %(funcName)s(): %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore:.*unclosed.*:ResourceWarning

# Timeouts
timeout = 300
timeout_method = thread

# Coverage (when using pytest-cov)
# Configured in pyproject.toml or via command line

# Async support
asyncio_mode = auto

# Minimum version
minversion = 7.0