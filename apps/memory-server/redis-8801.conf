# Redis Configuration for AI-Server Memory-Server
# Port: 8801 (following AI-Server port allocation plan)

port 8801
bind 127.0.0.1

# Basic configuration
daemonize yes
pidfile /tmp/redis-8801.pid
logfile /Users/server/AI-projects/AI-server/apps/memory-server/data/logs/redis-8801.log
dir /Users/server/AI-projects/AI-server/apps/memory-server/data/redis

# Memory and performance
maxmemory 256mb
maxmemory-policy allkeys-lru
tcp-keepalive 300
timeout 0

# Persistence for task queues
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice

# Security (basic)
protected-mode yes

# Append only file for durability
appendonly yes
appendfilename "appendonly-8801.aof"
appendfsync everysec

# Client settings
tcp-backlog 511
databases 16

# Memory-Server specific databases:
# DB 0: Celery broker (task queue)
# DB 1: Celery results backend
# DB 2: Session storage (future)
# DB 3: Cache (future)